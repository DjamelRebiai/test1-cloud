<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Classifier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .container { max-width: 800px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .result-box { padding: 15px; border-radius: 5px; margin-top: 15px; display: none; }
        .btn-custom { width: 100%; margin-top: 10px; }
        .email-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .email-item:last-child { border-bottom: none; }
        .badge-important { background-color: #dc3545; }
        .badge-normal { background-color: #198754; }
        .badge-spam { background-color: #ffc107; color: black; }
        #spinner { display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4">📧 Intelligente Email Classifier</h2>
        
        <!-- Tab Navigation -->
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="manual-tab" data-bs-toggle="tab" data-bs-target="#manual" type="button" role="tab">🛠️ Test Manuel</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="imap-tab" data-bs-toggle="tab" data-bs-target="#imap" type="button" role="tab">📥 Fetch Emails</button>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content" id="myTabContent">
            
            <!-- Manual Test Tab -->
            <div class="tab-pane fade show active p-4 bg-white border border-top-0 card" id="manual" role="tabpanel">
                <form id="manualForm">
                    <div class="mb-3">
                        <label for="emailText" class="form-label">Entrez le texte de l'email :</label>
                        <textarea class="form-control" id="emailText" rows="4" placeholder="Ex: urgent meeting tomorrow..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-custom">Classifier l'Email</button>
                </form>
                <div id="manualResult" class="result-box alert"></div>
            </div>

            <!-- Fetch Real Emails Tab -->
            <div class="tab-pane fade p-4 bg-white border border-top-0 card" id="imap" role="tabpanel">
                <div class="alert alert-info">
                    <strong>Note:</strong> Cette fonction utilise le protocole IMAP. Assurez-vous d'avoir configuré les mots de passe d'application si vous utilisez Gmail.
                </div>
                <form id="imapForm">
                    <div class="mb-3">
                        <label class="form-label">Serveur IMAP</label>
                        <input type="text" class="form-control" id="imapServer" placeholder="imap.gmail.com" value="imap.gmail.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Adresse Email</label>
                        <input type="email" class="form-control" id="imapEmail" placeholder="votre.email@gmail.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mot de Passe (App Password)</label>
                        <input type="password" class="form-control" id="imapPassword" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre d'emails récents à analyser</label>
                        <input type="number" class="form-control" id="emailCount" value="5" min="1" max="20" required>
                    </div>
                    <button type="submit" class="btn btn-success btn-custom">
                        Récupérer et Classifier 
                        <div class="spinner-border spinner-border-sm" id="spinner" role="status"></div>
                    </button>
                </form>
                
                <div id="imapResults" class="mt-4" style="display: none;">
                    <h5>Résultats d'analyse :</h5>
                    <div id="emailsList" class="list-group"></div>
                </div>
                <div id="imapError" class="alert alert-danger mt-3" style="display: none;"></div>
            </div>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Manual Test Handle
        document.getElementById('manualForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = document.getElementById('emailText').value;
            if(!text) return;

            const resultBox = document.getElementById('manualResult');
            resultBox.style.display = 'block';
            resultBox.className = 'result-box alert alert-secondary';
            resultBox.innerHTML = 'Analyse en cours...';

            try {
                const res = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: text })
                });
                const data = await res.json();
                
                if(data.error) throw new Error(data.error);
                
                let badgeClass = 'bg-secondary';
                if(data.classe === 'important') badgeClass = 'badge-important';
                if(data.classe === 'normal') badgeClass = 'badge-normal';
                if(data.classe === 'spam') badgeClass = 'badge-spam';

                resultBox.className = 'result-box alert border';
                resultBox.innerHTML = `Résultat : <span class="badge ${badgeClass} fs-6">${data.classe.toUpperCase()}</span>`;
            } catch (err) {
                resultBox.className = 'result-box alert alert-danger';
                resultBox.innerHTML = 'Erreur: ' + err.message;
            }
        });

        // IMAP Fetch Handle
        document.getElementById('imapForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const server = document.getElementById('imapServer').value;
            const email = document.getElementById('imapEmail').value;
            const password = document.getElementById('imapPassword').value;
            const limit = document.getElementById('emailCount').value;

            const spinner = document.getElementById('spinner');
            const resultsDiv = document.getElementById('imapResults');
            const listDiv = document.getElementById('emailsList');
            const errorDiv = document.getElementById('imapError');

            spinner.style.display = 'inline-block';
            resultsDiv.style.display = 'none';
            errorDiv.style.display = 'none';
            listDiv.innerHTML = '';

            try {
                const res = await fetch('/fetch-emails', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ server, email, password, limit: parseInt(limit) })
                });
                const data = await res.json();

                if(data.error) throw new Error(data.error);

                if(data.emails.length === 0) {
                    listDiv.innerHTML = '<div class="alert alert-warning">Aucun email trouvé</div>';
                } else {
                    data.emails.forEach(msg => {
                        let badgeClass = 'bg-secondary';
                        if(msg.prediction === 'important') badgeClass = 'badge-important';
                        if(msg.prediction === 'normal') badgeClass = 'badge-normal';
                        if(msg.prediction === 'spam') badgeClass = 'badge-spam';

                        const snippet = msg.body.substring(0, 100) + (msg.body.length > 100 ? '...' : '');

                        listDiv.innerHTML += `
                            <div class="list-group-item email-item">
                                <div class="d-flex w-100 justify-content-between">
                                    <h6 class="mb-1">De: ${msg.sender}</h6>
                                    <span class="badge ${badgeClass}">${msg.prediction.toUpperCase()}</span>
                                </div>
                                <p class="mb-1 fw-bold">Sujet: ${msg.subject}</p>
                                <small class="text-muted">${snippet}</small>
                            </div>
                        `;
                    });
                }
                resultsDiv.style.display = 'block';

            } catch (err) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'Erreur lors de la récupération: ' + err.message;
            } finally {
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
